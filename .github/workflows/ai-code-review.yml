name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  copilot: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Fetch pull request diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIFF_URL: ${{ github.event.pull_request.diff_url }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.diff" \
            "${DIFF_URL}" > pr.diff

      - name: Review with Claude then fallback to Codex
        id: ai_review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_MODEL: anthropic/claude-sonnet-4.5
          CODEX_MODEL: ${{ vars.CODE_REVIEW_FALLBACK_MODEL || 'openai/gpt-5.3-codex' }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          from pathlib import Path

          diff = Path("pr.diff").read_text(encoding="utf-8", errors="replace")
          max_chars = 120000
          if len(diff) > max_chars:
              truncated_lines = []
              current = 0
              for line in diff.splitlines(keepends=True):
                  if current + len(line) > max_chars:
                      break
                  truncated_lines.append(line)
                  current += len(line)
              diff = "".join(truncated_lines) + "\n\n[Diff truncated due to size]\n"

          prompt = (
              "Review this pull request diff. "
              "Return concise findings grouped as: Critical, Major, Minor, and Optional. "
              "Include file paths and line references when possible. "
              "If no issues are found, reply exactly: No issues found.\n\n"
              f"{diff}"
          )

          models = [os.environ["CLAUDE_MODEL"], os.environ["CODEX_MODEL"]]
          last_error = None
          review = ""
          used_model = ""

          for model in models:
              payload = {
                  "model": model,
                  "messages": [
                      {"role": "system", "content": "You are an expert software code reviewer."},
                      {"role": "user", "content": prompt},
                  ],
                  "temperature": 0.1,
              }

              req = urllib.request.Request(
                  "https://api.github.com/copilot/v1/chat/completions",
                  data=json.dumps(payload).encode("utf-8"),
                  headers={
                      "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                      "Content-Type": "application/json",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(req, timeout=180) as resp:
                      data = json.loads(resp.read().decode("utf-8"))
                  review = data["choices"][0]["message"]["content"].strip()
                  used_model = model
                  break
              except urllib.error.HTTPError as err:
                  detail = err.read().decode("utf-8", errors="replace")
                  last_error = f"HTTP {err.code}: {detail}"
              except Exception as err:
                  last_error = str(err)

          if not review:
              raise RuntimeError(f"AI review failed for all models: {last_error}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"model={used_model}\n")
              fh.write("review<<EOF\n")
              fh.write(review + "\n")
              fh.write("EOF\n")
          PY

      - name: Post review comment
        if: always() && steps.ai_review.outputs.review != ''
        uses: actions/github-script@v7
        env:
          AI_REVIEW: ${{ steps.ai_review.outputs.review }}
          AI_REVIEW_MODEL: ${{ steps.ai_review.outputs.model }}
        with:
          script: |
            const review = process.env.AI_REVIEW;
            const model = process.env.AI_REVIEW_MODEL;
            const body = `## AI Code Review (${model})\n\n${review}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
