name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=tests/e2e,tests/integration,tests/performance,node_modules,.git
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=tests/e2e,tests/integration,tests/performance,node_modules,.git

      - name: Ruff lint
        run: ruff check . --output-format=github --ignore=E402,F401,F403,F541,F841,F821

      - name: Ruff format check
        continue-on-error: true
        run: ruff format --check .

      - name: Type check
        continue-on-error: true
        run: mypy agents/ core/ schemas/ models/ services/ --ignore-missing-imports

  # =========================================================================
  # Unit & Integration Tests
  # =========================================================================
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov httpx

      - name: Run Python unit tests
        env:
          REDIS_URL: redis://localhost:6379/0
          POSTGRES_DSN: postgresql+asyncpg://wanderplan:test_password@localhost:5432/wanderplan_test
        run: |
          pytest tests/ \
            --ignore=tests/e2e \
            --ignore=tests/integration \
            --ignore=tests/performance \
            -v --cov=agents --cov=core --cov=services \
            --cov-report=xml --cov-report=term-missing \
            || [ $? -eq 5 ]

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tests/integration/package.json

      - name: Install integration test dependencies
        working-directory: tests/integration
        run: npm ci

      - name: Run integration tests
        working-directory: tests/integration
        continue-on-error: true
        env:
          API_BASE_URL: http://localhost:18000
          MOCK_API_URL: http://localhost:4000
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: wanderplan_test
          POSTGRES_USER: wanderplan
          POSTGRES_PASSWORD: test_password
          SKIP_DOCKER_UP: "true"
          SKIP_DOCKER_DOWN: "true"
        run: npm run ci

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        service: [frontend, auth-service, trip-service, destination-service, crew-service, ai-service, analytics-service, notification-service, live-companion-service, bucket-list-service, health-service, feedback-service, search-service, media-service, gateway]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/wanderplan-${{ matrix.service }}:latest
        continue-on-error: true

  security:
    name: security
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, python
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
