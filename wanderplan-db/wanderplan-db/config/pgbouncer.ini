; ============================================================================
; WanderPlan AI — PgBouncer Connection Pool Configuration
; 15 microservices × max 5 connections each = 75 server connections max
; ============================================================================
;
; Deployment: runs as sidecar or standalone proxy between app and PostgreSQL.
; Install: apt install pgbouncer  |  Docker: edoburu/pgbouncer
; Start:   pgbouncer /etc/pgbouncer/pgbouncer.ini
; ============================================================================

; ── Database Routing ──────────────────────────────────────────────────────

[databases]
; Primary (read-write) — all services connect here for writes
wanderplan = host=pg-primary.internal port=5432 dbname=wanderplan auth_user=pgbouncer_auth

; Read replica — search, POI, analytics services connect here for reads
wanderplan_replica = host=pg-replica.internal port=5432 dbname=wanderplan auth_user=pgbouncer_auth

; ── Connection Pool Settings ──────────────────────────────────────────────

[pgbouncer]

; --- Listening ---
listen_addr = 0.0.0.0
listen_port = 6432
unix_socket_dir = /var/run/pgbouncer

; --- Authentication ---
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename=$1

; --- Pool Mode ---
; "transaction" mode: server connection is returned to pool after each transaction.
; Best for microservices that use short-lived transactions.
; Avoids session-level features (LISTEN/NOTIFY, prepared statements in session mode).
pool_mode = transaction

; --- Pool Sizing ---
; 15 microservices × 5 connections each = 75 client connections max
; Server-side: PostgreSQL max_connections = 100 (leaving 25 for admin/monitoring)

; Maximum client connections PgBouncer will accept
max_client_conn = 200

; Default pool size per database/user pair
default_pool_size = 20

; Minimum pool connections to keep open (warm pool)
min_pool_size = 5

; Extra connections allowed above default_pool_size during bursts
reserve_pool_size = 10

; How long a client can wait for a server connection (seconds)
reserve_pool_timeout = 3

; Maximum server connections to PostgreSQL per database
max_db_connections = 75

; Maximum server connections per user
max_user_connections = 50

; --- Timeouts ---
; How long a server connection can be idle before being closed
server_idle_timeout = 300

; How long to wait for a server connection before giving up
server_connect_timeout = 5

; How long to wait for a login response from server
server_login_retry = 3

; Client idle timeout — close idle client connections
client_idle_timeout = 600

; Query timeout — kill queries running longer than this (0 = disabled)
query_timeout = 300

; Cancel pending queries on client disconnect
cancel_after_timeout = 10

; --- Connection Lifecycle ---
; Close server connection after this many transactions (0 = unlimited)
; Helps with memory leak prevention in PostgreSQL
server_lifetime = 3600

; Check server health with a lightweight query
server_check_query = SELECT 1
server_check_delay = 30

; --- Logging ---
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
log_stats = 1
stats_period = 60

; Log file (or use syslog)
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid

; --- Admin Console ---
admin_users = pgbouncer_admin
stats_users = pgbouncer_stats, monitoring

; --- TLS (production) ---
; client_tls_sslmode = require
; client_tls_cert_file = /etc/pgbouncer/tls/server.crt
; client_tls_key_file = /etc/pgbouncer/tls/server.key
; server_tls_sslmode = verify-full
; server_tls_ca_file = /etc/pgbouncer/tls/ca.crt

; --- DNS ---
dns_max_ttl = 300
dns_nxdomain_ttl = 15

; ── Per-Service Pool Overrides ────────────────────────────────────────────
;
; Configure per-user pool sizes for fine-grained control.
; Each microservice authenticates as its own PostgreSQL user.
;
; Service                   User                Pool  Connects To
; ─────────────────────────────────────────────────────────────────
; api-gateway               svc_api             5     primary
; trip-service              svc_trips           5     primary
; user-service              svc_users           5     primary
; booking-service           svc_booking         5     primary
; payment-service           svc_payments        5     primary
; calendar-service          svc_calendar        3     primary
; notification-service      svc_notifications   3     primary
; social-service            svc_social          3     primary
; search-service            svc_search          5     replica
; poi-service               svc_pois            5     replica
; analytics-service         svc_analytics       5     replica
; weather-service           svc_weather         3     primary
; health-service            svc_health          3     primary
; storyboard-service        svc_storyboard      3     primary
; admin-service             svc_admin           3     primary
; ─────────────────────────────────────────────────────────────────
; Total                                         66    (within 75 budget)

[users]
svc_api           = pool_mode=transaction max_user_connections=5
svc_trips         = pool_mode=transaction max_user_connections=5
svc_users         = pool_mode=transaction max_user_connections=5
svc_booking       = pool_mode=transaction max_user_connections=5
svc_payments      = pool_mode=transaction max_user_connections=5
svc_calendar      = pool_mode=transaction max_user_connections=3
svc_notifications = pool_mode=transaction max_user_connections=3
svc_social        = pool_mode=transaction max_user_connections=3
svc_search        = pool_mode=transaction max_user_connections=5
svc_pois          = pool_mode=transaction max_user_connections=5
svc_analytics     = pool_mode=transaction max_user_connections=5
svc_weather       = pool_mode=transaction max_user_connections=3
svc_health        = pool_mode=transaction max_user_connections=3
svc_storyboard    = pool_mode=transaction max_user_connections=3
svc_admin         = pool_mode=transaction max_user_connections=3

; ── Auth File Template ────────────────────────────────────────────────────
; Generate userlist.txt:
;   "svc_api"           "SCRAM-SHA-256$4096:..."
;   "svc_trips"         "SCRAM-SHA-256$4096:..."
;   "pgbouncer_admin"   "SCRAM-SHA-256$4096:..."
;   "pgbouncer_stats"   "SCRAM-SHA-256$4096:..."
