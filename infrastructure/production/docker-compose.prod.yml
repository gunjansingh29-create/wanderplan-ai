
version: "3.8"
services:
  # =========================================================================
  # LAYER X: FRONTEND (React app)
  # =========================================================================
  frontend:
    build:
      context: ../..
      dockerfile: frontend.Dockerfile
    container_name: wanderplan-frontend
    networks:
      - wanderplan-public
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`web.${DOMAIN:-localhost}`) || Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.frontend.entrypoints=web,websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

  # =========================================================================
  # LAYER 1: REVERSE PROXY / LOAD BALANCER (replaces ALB + VPC public subnet)
  # =========================================================================

  traefik:
    image: traefik:v3.1
    container_name: wanderplan-traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=wanderplan-public"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entryPoints.web.address=:80"
      - "--entryPoints.websecure.address=:443"
      - "--entryPoints.web.http.redirections.entrypoint.to=websecure"
      - "--entryPoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesResolvers.letsencrypt.acme.httpChallenge.entryPoint=web"
      - "--certificatesResolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@wanderplan.local}"
      - "--certificatesResolvers.letsencrypt.acme.storage=/etc/traefik/acme/acme.json"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.entryPoint=metrics"
      - "--entryPoints.metrics.address=:8082"
      - "--tracing.otlp=true"
      - "--tracing.otlp.grpc.endpoint=jaeger:4317"
      - "--tracing.otlp.grpc.insecure=true"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
      - "--accesslog.format=json"
      - "--ping=true"
    ports:
      - "80:80"
      - "443:443"
      - "8082:8082"       # Prometheus metrics
    volumes:
      # - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/etc/traefik/acme
      - ../traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-logs:/var/log/traefik
    networks:
      - wanderplan-public
      - wanderplan-private
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH:-admin:$$2y$$10$$placeholder}"

  # =========================================================================
  # LAYER 2: ORCHESTRATOR AGENT (the coordinator)
  # =========================================================================

  orchestrator:
    build:
      context: ../..
      dockerfile: infrastructure/Dockerfile.agent
    # container_name removed to allow deploy.replicas
    command: >
      uvicorn agents.orchestrator:app
      --host 0.0.0.0 --port 8000
      --workers 4 --loop uvloop --http httptools
    networks:
      - wanderplan-public
      - wanderplan-private
    environment:
      REDIS_URL: redis://redis-master:6379/0
      KAFKA_BOOTSTRAP: kafka-1:9092,kafka-2:9093,kafka-3:9094
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-20250514}
      LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL:-}
      OLLAMA_BASE_URL: http://ollama:11434
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      JAEGER_AGENT_HOST: jaeger
      JAEGER_AGENT_PORT: "6831"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      ENVIRONMENT: production
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-wanderplan}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-wanderplan-secret-key}
      AGENT_ID: orchestrator
      AGENT_PORT: "8000"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
      replicas: 2
    labels:
      - "traefik.enable=true"
      # REST API
      - "traefik.http.routers.api.rule=Host(`api.${DOMAIN:-localhost}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api.middlewares=rate-limit,cors,compress"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      - "traefik.http.services.api.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.api.loadbalancer.healthcheck.interval=10s"
      # WebSocket
      - "traefik.http.routers.ws.rule=Host(`api.${DOMAIN:-localhost}`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.ws.entrypoints=websecure"
      - "traefik.http.routers.ws.tls.certresolver=letsencrypt"
      - "traefik.http.services.ws.loadbalancer.server.port=8000"
      # Middlewares
      - "traefik.http.middlewares.rate-limit.ratelimit.average=60"
      - "traefik.http.middlewares.rate-limit.ratelimit.burst=20"
      - "traefik.http.middlewares.rate-limit.ratelimit.period=1m"
      - "traefik.http.middlewares.cors.headers.accessControlAllowOriginList=https://${DOMAIN:-localhost}"
      - "traefik.http.middlewares.cors.headers.accessControlAllowMethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.http.middlewares.cors.headers.accessControlAllowHeaders=Authorization,Content-Type"
      - "traefik.http.middlewares.compress.compress=true"

