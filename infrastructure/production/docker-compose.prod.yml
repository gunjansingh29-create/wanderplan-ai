      dockerfile: infrastructure/Dockerfile.agent
    container_name: wanderplan-group-coordinator
    command: ["uvicorn", "agents.specialists.group_coordinator:app", "--host", "0.0.0.0", "--port", "8014", "--workers", "2"]
    networks:
      - wanderplan-private
    environment:
      REDIS_URL: redis://redis-master:6379/0
      KAFKA_BOOTSTRAP: kafka-1:9092,kafka-2:9093,kafka-3:9094
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-20250514}
      LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL:-}
      OLLAMA_BASE_URL: http://ollama:11434
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      JAEGER_AGENT_HOST: jaeger
      JAEGER_AGENT_PORT: "6831"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      ENVIRONMENT: production
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-wanderplan}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-wanderplan-secret-key}
      AGENT_ID: group_coordinator
      AGENT_PORT: "8014"

  # =========================================================================
  # LAYER 4: KAFKA 3-BROKER CLUSTER (replaces Amazon MSK)
  # =========================================================================

  kafka-controller:
    image: confluentinc/cp-kafka:7.6.0
    container_name: wanderplan-kafka-controller
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka-controller:9093"
      KAFKA_LISTENERS: CONTROLLER://kafka-controller:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: "wanderplan-kafka-cluster-001"
    volumes:
      - kafka-controller-data:/var/lib/kafka/data
    networks:
      - wanderplan-private
    healthcheck:
      test: ["CMD-SHELL", "echo 'healthy'"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-1:
    image: confluentinc/cp-kafka:7.6.0
    container_name: wanderplan-kafka-1
    depends_on:
      - kafka-controller
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka-controller:9093"
      KAFKA_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 10737418240
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      CLUSTER_ID: "wanderplan-kafka-cluster-001"
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    networks:
      - wanderplan-private
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-2:
    image: confluentinc/cp-kafka:7.6.0
    container_name: wanderplan-kafka-2
    depends_on:
      - kafka-controller
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka-controller:9093"
      KAFKA_LISTENERS: PLAINTEXT://kafka-2:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 12
      CLUSTER_ID: "wanderplan-kafka-cluster-001"
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    networks:
      - wanderplan-private

  kafka-3:
    image: confluentinc/cp-kafka:7.6.0
    container_name: wanderplan-kafka-3
    depends_on:
      - kafka-controller
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka-controller:9093"
      KAFKA_LISTENERS: PLAINTEXT://kafka-3:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 12
      CLUSTER_ID: "wanderplan-kafka-cluster-001"
    volumes:
      - kafka-3-data:/var/lib/kafka/data
    networks:
      - wanderplan-private

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: wanderplan-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: wanderplan-production
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9093,kafka-3:9094
    networks:
      - wanderplan-private
      - wanderplan-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kafka-ui.rule=Host(`kafka.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.kafka-ui.middlewares=auth"
      - "traefik.http.services.kafka-ui.loadbalancer.server.port=8080"

  # =========================================================================
  # LAYER 5: POSTGRESQL PRIMARY + READ REPLICA (replaces RDS Multi-AZ)
  # =========================================================================

  postgres-primary:
    image: postgres:16
    container_name: wanderplan-pg-primary
    environment:
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: repl_user
      POSTGRESQL_REPLICATION_PASSWORD: ${PG_REPL_PASSWORD:-repl_secret}
      POSTGRESQL_USERNAME: wanderplan
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRESQL_DATABASE: wanderplan
      POSTGRESQL_EXTRA_FLAGS: >
        -c wal_level=replica
        -c max_wal_senders=5
        -c max_replication_slots=5
        -c hot_standby=on
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c max_connections=200
        -c log_min_duration_statement=500
    volumes:
      - pg-primary-data:/bitnami/postgresql
    networks:
      - wanderplan-private
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wanderplan -d wanderplan"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-replica:
    image: postgres:16
    container_name: wanderplan-pg-replica
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_REPLICATION_USER: repl_user
      POSTGRESQL_REPLICATION_PASSWORD: ${PG_REPL_PASSWORD:-repl_secret}
      POSTGRESQL_MASTER_HOST: postgres-primary
      POSTGRESQL_MASTER_PORT_NUMBER: 5432
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRESQL_EXTRA_FLAGS: >
        -c hot_standby=on
        -c max_standby_streaming_delay=30s
    volumes:
      - pg-replica-data:/bitnami/postgresql
    networks:
      - wanderplan-private
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # =========================================================================
  # LAYER 6: MONGODB REPLICA SET (replaces DocumentDB)
  # =========================================================================

  mongo-primary:
    image: mongo:7
    container_name: wanderplan-mongo-primary
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--keyFile", "/etc/mongo/keyfile"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: wanderplan
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-primary-data:/data/db
      - ../scripts/mongo-keyfile:/etc/mongo/keyfile:ro
    networks:
      - wanderplan-private
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-secondary:
    image: mongo:7
    container_name: wanderplan-mongo-secondary
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--keyFile", "/etc/mongo/keyfile"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: wanderplan
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-secondary-data:/data/db
      - ../scripts/mongo-keyfile:/etc/mongo/keyfile:ro
    networks:
      - wanderplan-private
    depends_on:
      mongo-primary:
        condition: service_healthy

  # =========================================================================
  # LAYER 7: REDIS SENTINEL CLUSTER (replaces ElastiCache 3-node)
  # =========================================================================

  redis-master:
    image: redis:7.2
    container_name: wanderplan-redis-master
    environment:
      REDIS_REPLICATION_MODE: master
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_MAXMEMORY: 512mb
      REDIS_MAXMEMORY_POLICY: allkeys-lru
      REDIS_AOF_ENABLED: "yes"
    volumes:
      - redis-master-data:/bitnami/redis/data
    networks:
      - wanderplan-private
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-replica-1:
    image: redis:7.2
    container_name: wanderplan-redis-replica-1
    depends_on:
      redis-master:
        condition: service_healthy
    environment:
      REDIS_REPLICATION_MODE: slave
      REDIS_MASTER_HOST: redis-master
      REDIS_MASTER_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-replica-1-data:/bitnami/redis/data
    networks:
      - wanderplan-private

  redis-replica-2:
    image: redis:7.2
    container_name: wanderplan-redis-replica-2
    depends_on:
      redis-master:
        condition: service_healthy
    environment:
      REDIS_REPLICATION_MODE: slave
      REDIS_MASTER_HOST: redis-master
      REDIS_MASTER_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-replica-2-data:/bitnami/redis/data
    networks:
      - wanderplan-private

  redis-sentinel-1:
    image: redis:7.2
    container_name: wanderplan-sentinel-1
    environment:
      REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS: 5000
      REDIS_MASTER_HOST: redis-master
      REDIS_MASTER_PORT_NUMBER: 6379
      REDIS_MASTER_PASSWORD: ${REDIS_PASSWORD}
      REDIS_SENTINEL_QUORUM: 2
    networks:
      - wanderplan-private
    depends_on:
      redis-master:
        condition: service_healthy

  redis-sentinel-2:
    image: redis:7.2
    container_name: wanderplan-sentinel-2
    environment:
      REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS: 5000
      REDIS_MASTER_HOST: redis-master
      REDIS_MASTER_PORT_NUMBER: 6379
      REDIS_MASTER_PASSWORD: ${REDIS_PASSWORD}
      REDIS_SENTINEL_QUORUM: 2
    networks:
      - wanderplan-private
    depends_on:
      redis-master:
        condition: service_healthy

  redis-sentinel-3:
    image: redis:7.2
    container_name: wanderplan-sentinel-3
    environment:
      REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS: 5000
      REDIS_MASTER_HOST: redis-master
      REDIS_MASTER_PORT_NUMBER: 6379
      REDIS_MASTER_PASSWORD: ${REDIS_PASSWORD}
      REDIS_SENTINEL_QUORUM: 2
    networks:
      - wanderplan-private
    depends_on:
      redis-master:
        condition: service_healthy

  # =========================================================================
  # LAYER 8: OPENSEARCH CLUSTER (replaces AWS OpenSearch)
  # =========================================================================

  opensearch-node1:
    image: opensearchproject/opensearch:2.13.0
    container_name: wanderplan-opensearch-1
    environment:
      - cluster.name=wanderplan-search
      - node.name=opensearch-node1
      - discovery.seed_hosts=opensearch-node1,opensearch-node2
      - cluster.initial_cluster_manager_nodes=opensearch-node1
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - plugins.security.disabled=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch-1-data:/usr/share/opensearch/data
    networks:
      - wanderplan-private
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1.5G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  opensearch-node2:
    image: opensearchproject/opensearch:2.13.0
    container_name: wanderplan-opensearch-2
    environment:
      - cluster.name=wanderplan-search
      - node.name=opensearch-node2
      - discovery.seed_hosts=opensearch-node1,opensearch-node2
      - cluster.initial_cluster_manager_nodes=opensearch-node1
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - plugins.security.disabled=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch-2-data:/usr/share/opensearch/data
    networks:
      - wanderplan-private

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: wanderplan-opensearch-dashboards
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch-node1:9200","http://opensearch-node2:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    networks:
      - wanderplan-private
      - wanderplan-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.opensearch-dash.rule=Host(`search.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.opensearch-dash.middlewares=auth"
      - "traefik.http.services.opensearch-dash.loadbalancer.server.port=5601"

  # =========================================================================
  # LAYER 9: MINIO OBJECT STORAGE (replaces S3 + CloudFront)
  # =========================================================================

  minio:
    image: minio/minio:latest
    container_name: wanderplan-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-wanderplan}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-wanderplan-secret-key}
      MINIO_BROWSER_REDIRECT_URL: https://storage.${DOMAIN:-localhost}
    volumes:
      - minio-data:/data
    networks:
      - wanderplan-private
      - wanderplan-public
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      # S3 API
      - "traefik.http.routers.minio-api.rule=Host(`s3.${DOMAIN:-localhost}`)"
      - "traefik.http.services.minio-api.loadbalancer.server.port=9000"
      # Console
      - "traefik.http.routers.minio-console.rule=Host(`storage.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.minio-console.middlewares=auth"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"

  # Nginx caching proxy in front of MinIO (replaces CloudFront CDN)
  cdn-cache:
    image: nginx:alpine
    container_name: wanderplan-cdn-cache
    volumes:
      - ../traefik/cdn-cache.conf:/etc/nginx/conf.d/default.conf:ro
      - cdn-cache-data:/var/cache/nginx
    networks:
      - wanderplan-private
      - wanderplan-public
    depends_on:
      - minio
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cdn.rule=Host(`cdn.${DOMAIN:-localhost}`)"
      - "traefik.http.services.cdn.loadbalancer.server.port=80"

  # =========================================================================
  # LAYER 10: LLM INFERENCE (replaces AWS Bedrock)
  # =========================================================================

  # Ollama for local model fallback when Anthropic API is unavailable
  ollama:
    image: ollama/ollama:latest
    container_name: wanderplan-ollama
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - wanderplan-private
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "2.0"
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =========================================================================
  # LAYER 11: OBSERVABILITY (replaces CloudWatch + X-Ray + PagerDuty)
  # =========================================================================

  # Jaeger — distributed tracing (replaces AWS X-Ray)
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: wanderplan-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    volumes:
      - jaeger-data:/badger
    ports:
      - "6831:6831/udp"   # Jaeger agent (UDP)
      - "4317:4317"       # OTLP gRPC
      - "4318:4318"       # OTLP HTTP
    networks:
      - wanderplan-private
      - wanderplan-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jaeger.rule=Host(`tracing.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.jaeger.middlewares=auth"
      - "traefik.http.services.jaeger.loadbalancer.server.port=16686"

  # Prometheus — metrics collection (replaces CloudWatch metrics)
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: wanderplan-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=10GB"
      - "--web.enable-lifecycle"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus/rules/:/etc/prometheus/rules/:ro
      - prometheus-data:/prometheus
    networks:
      - wanderplan-private
      - wanderplan-public
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.prometheus.middlewares=auth"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  # Alertmanager — alerting (replaces PagerDuty direct integration)
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: wanderplan-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ../monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks:
      - wanderplan-private
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.alertmanager.rule=Host(`alerts.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.alertmanager.middlewares=auth"
      - "traefik.http.services.alertmanager.loadbalancer.server.port=9093"

  # Grafana — dashboards (replaces CloudWatch dashboards)
  grafana:
    image: grafana/grafana:10.4.0
    container_name: wanderplan-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-clock-panel
      GF_SERVER_ROOT_URL: https://grafana.${DOMAIN:-localhost}
    volumes:
      - grafana-data:/var/lib/grafana
      - ../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    networks:
      - wanderplan-private
      - wanderplan-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN:-localhost}`)"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  # Node exporter — host machine metrics
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: wanderplan-node-exporter
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro,rslave
    networks:
      - wanderplan-private
    pid: host

  # cAdvisor — container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: wanderplan-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - wanderplan-private

  # =========================================================================
  # LAYER 12: AUTOSCALER (replaces ECS auto-scaling policies)
  # =========================================================================

  autoscaler:
    build:
      context: ../..
      dockerfile: infrastructure/Dockerfile.autoscaler
    container_name: wanderplan-autoscaler
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      COMPOSE_PROJECT: wanderplan
      SCALE_UP_CPU_THRESHOLD: "70"
      SCALE_DOWN_CPU_THRESHOLD: "20"
      SCALE_UP_QUEUE_DEPTH: "100"
      MIN_REPLICAS: "1"
      MAX_REPLICAS: "5"
      CHECK_INTERVAL: "30"
    networks:
      - wanderplan-private
    depends_on:
      - prometheus

# =========================================================================
# NETWORKS (replaces VPC public/private subnet architecture)
# =========================================================================

networks:
  wanderplan-public:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24     # "public subnet" — Traefik, externally-reachable
  wanderplan-private:
    driver: bridge
    internal: true                    # No external access — "private subnet"
    ipam:
      config:
        - subnet: 172.20.1.0/24

