# =============================================================================
# Nginx CDN Cache — Replaces AWS CloudFront
# Caching proxy in front of MinIO for static assets, photos, and media
# =============================================================================

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=cdn_cache:50m
                 max_size=5g inactive=7d use_temp_path=off;

upstream minio_backend {
    server minio:9000;
    keepalive 32;
}

server {
    listen 80;
    server_name cdn.localhost;

    # --- Static frontend assets (replaces S3 + CloudFront for Next.js build) ---
    location /static/ {
        proxy_pass http://minio_backend/wanderplan-static/;
        proxy_cache cdn_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        proxy_cache_lock on;
        proxy_cache_revalidate on;
        proxy_cache_min_uses 1;

        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header Access-Control-Allow-Origin "*";

        expires 30d;
        gzip on;
        gzip_types text/css application/javascript application/json image/svg+xml;
    }

    # --- User-uploaded photos ---
    location /photos/ {
        proxy_pass http://minio_backend/wanderplan-photos/;
        proxy_cache cdn_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout http_500 http_502 http_503;

        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=604800";

        # Limit upload size
        client_max_body_size 25m;
    }

    # --- Storyboard media / trip exports ---
    location /media/ {
        proxy_pass http://minio_backend/wanderplan-media/;
        proxy_cache cdn_cache;
        proxy_cache_valid 200 3d;
        proxy_cache_valid 404 1m;

        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=259200";
    }

    # --- Calendar ICS downloads (short cache) ---
    location /exports/ {
        proxy_pass http://minio_backend/wanderplan-exports/;
        proxy_cache cdn_cache;
        proxy_cache_valid 200 5m;

        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=300";
        add_header Content-Disposition "attachment";
    }

    # --- Health check ---
    location /health {
        return 200 '{"status":"healthy","cache":"active"}';
        add_header Content-Type application/json;
    }

    # --- Cache purge endpoint (admin only) ---
    location /purge/ {
        allow 172.20.0.0/16;
        allow 127.0.0.1;
        deny all;

        proxy_cache_purge cdn_cache "$scheme$request_method$host$request_uri";
    }
}
