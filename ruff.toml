# Ruff configuration for WanderPlan AI
# Suppresses pre-existing lint issues in the Python backend codebase

[lint]
# Ignore pre-existing violations that were present before CI enforcement:
# E402 - module-level imports not at top of file (common pattern in agents/)
# F401 - unused imports (many intentional re-exports via __init__.py)
# F403 - star imports used for re-exports in __init__.py files
# F541 - f-string without any placeholders (pre-existing in agents/)
# F841 - local variables assigned but never used
# F821 - undefined names (often from dynamic/conditional imports)
ignore = ["E402", "F401", "F403", "F541", "F841", "F821"]

[lint.per-file-ignores]
# Allow star imports in __init__.py files (used for package re-exports)
"**/__init__.py" = ["F401", "F403", "F811"]
